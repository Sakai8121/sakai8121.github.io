# --- 読み終わった本 (status: read) ---
- title: "Adaptive Code"
  author: "Gary McLean Hall"
  status: "read"
  cover: "assets/images/books/AdaptiveCode.jpg"
  comment: |
    C#実践開発手法。SOLID原則やデザインパターンをを学びました。大学3年生のときに先輩に勧められて通読した。実務や個人開発での設計経験を経た今、改めて読み直したい本。

- title: "ゲームフルデザイン"
  author: "Gary McLean Hall 他"
  status: "read"
  cover: "assets/images/books/ゲームフルデザイン.jpg"
  comment: |
    バイト先がゲーミフィケーションを活用しているため、勉強のために読んでみた。人間の欲求に関して言語化されていて、言われてみると確かにという発見が多かった。

- title: "スクウェア・エニックスのAI"
  author: "スクウェア・エニックス"
  status: "read"
  cover: "assets/images/books/スクウェア・エニックスのAI.jpg"
  comment: |
    研究室に入る前に何かきっかけになるものがあればいいと思い、読んでみた。結局、今の研究の内容はAIとは関係ないが、AIの実際の活用例をしれて勉強になった。

- title: "リーダブルコード"
  author: "ダスティン・ボズウェル 他"
  status: "read"
  cover: "assets/images/books/リーダブルコード.jpg"
  comment: |
    プログラマーになるなら必ず読んでおくべき本を調べて読んだ。特にコメントの役割や一度に1つのタスクという考え方をできるだけ意識するようにしている。

- title: "3Dゲームを面白くする技術"
  author: "大野 功二"
  status: "reading"
  cover: "assets/images/books/3Dゲームを面白くする技術.jpg"
  comment: |
    実例から様々なゲームメカニクスを知ることができた。遊んだことがあるゲームもあったが、そんな仕組みがあったのか！と驚くこともあり、勉強になった。

- title: "Game Programming Patterns"
  author: "Robert Nystrom, 武舎広幸 他"
  status: "reading"
  cover: "assets/images/books/Game Programming Patterns.jpg"
  comment: |
    デザインパターンが実際にどのような場面で使われるのかが書かれていて分かりやすかった。特にデータの局所化の話は印象的で、この本を読んでECSについて調べるようになった。
    
