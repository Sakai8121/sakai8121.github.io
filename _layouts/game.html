---
layout: default
---
<div class="container py-5">
  <h1 class="fw-bold mb-3">{{ page.title }}</h1>
  <div class="mb-4">
    {% for tag in page.tags %}
      <span class="badge bg-secondary me-1">{{ tag }}</span>
    {% endfor %}
  </div>

  <div class="content bg-white p-4 rounded shadow-sm border">
    {{ content }}
  </div>

  <div class="mt-4">
    <a href="{{ '/' | relative_url }}" class="btn btn-outline-secondary">← トップページに戻る</a>
  </div>
</div>
