---
layout: default
---
<div class="container py-5">
  <h1 class="fw-bold mb-1">{{ page.company }}</h1>
  <h3 class="text-primary mb-3">{{ page.role }}</h3>
  <p class="text-muted mb-4">{{ page.period }}</p>

  <div class="content bg-white p-4 rounded shadow-sm border">
    {{ content }}
  </div>

  <div class="mt-4">
    <a href="{{ '/' | relative_url }}" class="btn btn-outline-secondary">← トップページに戻る</a>
  </div>
</div>
